<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
<rect width="100%" height="100%" fill="white"/>
<text x="40" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="700">Thesis logic map</text>
<text x="40" y="75" font-family="Arial, sans-serif" font-size="15">How macro resilience, pressure, and evidence boundaries coexist</text>

<rect x="60" y="125" width="260" height="95" rx="10" fill="#f2f2f2" stroke="#333"/>
<text x="85" y="160" font-family="Arial, sans-serif" font-size="18" font-weight="700">Macro resilience</text>
<text x="85" y="188" font-family="Arial, sans-serif" font-size="14">Does not prove comfort</text>

<rect x="420" y="125" width="260" height="95" rx="10" fill="#f2f2f2" stroke="#333"/>
<text x="445" y="160" font-family="Arial, sans-serif" font-size="18" font-weight="700">Real pressure</text>
<text x="445" y="188" font-family="Arial, sans-serif" font-size="14">Does not prove collapse</text>

<rect x="780" y="125" width="260" height="95" rx="10" fill="#f2f2f2" stroke="#333"/>
<text x="805" y="160" font-family="Arial, sans-serif" font-size="18" font-weight="700">Formal channel</text>
<text x="805" y="188" font-family="Arial, sans-serif" font-size="14">Does not represent all households</text>

<line x1="320" y1="172" x2="420" y2="172" stroke="#333" stroke-width="2"/>
<line x1="680" y1="172" x2="780" y2="172" stroke="#333" stroke-width="2"/>

<rect x="210" y="305" width="680" height="105" rx="14" fill="#eaeaea" stroke="#111" stroke-width="2"/>
<text x="315" y="350" font-family="Arial, sans-serif" font-size="26" font-weight="700">Not collapse. Not comfort.</text>
<text x="390" y="385" font-family="Arial, sans-serif" font-size="26" font-weight="700">A selective squeeze.</text>

<line x1="190" y1="220" x2="390" y2="305" stroke="#333" stroke-width="2"/>
<line x1="550" y1="220" x2="550" y2="305" stroke="#333" stroke-width="2"/>
<line x1="910" y1="220" x2="710" y2="305" stroke="#333" stroke-width="2"/>

<text x="40" y="470" font-family="Arial, sans-serif" font-size="14">Rule: pressure is not behavior; context is not proof; the formal channel is not the whole household sector.</text>
