<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
<rect width="100%" height="100%" fill="white"/>
<text x="40" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="700">Mapa lógico de la tesis</text>
<text x="40" y="75" font-family="Arial, sans-serif" font-size="15">Cómo conviven resistencia macroeconómica, presión y límites de evidencia</text>

<rect x="60" y="125" width="260" height="95" rx="10" fill="#f2f2f2" stroke="#333"/>
<text x="85" y="160" font-family="Arial, sans-serif" font-size="18" font-weight="700">Resistencia macro</text>
<text x="85" y="188" font-family="Arial, sans-serif" font-size="14">No prueba comodidad</text>

<rect x="420" y="125" width="260" height="95" rx="10" fill="#f2f2f2" stroke="#333"/>
<text x="445" y="160" font-family="Arial, sans-serif" font-size="18" font-weight="700">Presión real</text>
<text x="445" y="188" font-family="Arial, sans-serif" font-size="14">No prueba colapso</text>

<rect x="780" y="125" width="260" height="95" rx="10" fill="#f2f2f2" stroke="#333"/>
<text x="805" y="160" font-family="Arial, sans-serif" font-size="18" font-weight="700">Canal formal</text>
<text x="805" y="188" font-family="Arial, sans-serif" font-size="14">No representa todos los hogares</text>

<line x1="320" y1="172" x2="420" y2="172" stroke="#333" stroke-width="2"/>
<line x1="680" y1="172" x2="780" y2="172" stroke="#333" stroke-width="2"/>

<rect x="210" y="305" width="680" height="105" rx="14" fill="#eaeaea" stroke="#111" stroke-width="2"/>
<text x="285" y="350" font-family="Arial, sans-serif" font-size="26" font-weight="700">Ni colapso. Ni comodidad.</text>
<text x="365" y="385" font-family="Arial, sans-serif" font-size="26" font-weight="700">Una presión selectiva.</text>

<line x1="190" y1="220" x2="390" y2="305" stroke="#333" stroke-width="2"/>
<line x1="550" y1="220" x2="550" y2="305" stroke="#333" stroke-width="2"/>
<line x1="910" y1="220" x2="710" y2="305" stroke="#333" stroke-width="2"/>

<text x="40" y="470" font-family="Arial, sans-serif" font-size="14">Regla: presión no es comportamiento; contexto no es prueba; canal formal no es hogar completo.</text>
</svg>